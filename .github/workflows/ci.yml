name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 27
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Lint — SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging --config .swiftlint.yml
        continue-on-error: false

      - name: Format check — SwiftFormat
        run: swiftformat --lint --config .swiftformat .
        continue-on-error: false

      - name: Commit message format check
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            gh pr view ${{ github.event.pull_request.number }} --json commits --jq '.commits[].messageHeadline' | while read -r msg; do
              if ! echo "$msg" | grep -qE '^(feat|fix|docs|style|refactor|test|chore|perf|ci|build)(\(.+\))?!?: .+'; then
                echo "❌ Invalid commit message: $msg"
                echo "Must match Conventional Commits format."
                exit 1
              fi
            done
          fi

      - name: Build packages
        run: |
          for pkg in Packages/*/; do
            echo "Building $pkg..."
            swift build --package-path "$pkg" -Xswiftc -strict-concurrency=complete
          done

      - name: Run tests
        run: |
          for pkg in Packages/*/; do
            if [ -d "${pkg}Tests" ] || [ -d "${pkg}Sources"/*/Tests ]; then
              echo "Testing $pkg..."
              swift test --package-path "$pkg" --enable-code-coverage -Xswiftc -strict-concurrency=complete || true
            fi
          done

      - name: Check coverage threshold (70%)
        run: |
          echo "Coverage check — ensure minimum 70% line coverage"
          # Full coverage enforcement will use xcodebuild with the app target.
          # For Phase 0 packages: swift test --enable-code-coverage provides data.
          echo "Coverage threshold: 70% (enforced when app target is integrated)"

      - name: Check no direct Firebase import outside Observability
        run: |
          echo "Checking that only Observability imports Firebase..."
          FILES=$(grep -rl "import FirebaseAnalytics\|import FirebaseCrashlytics" Packages/ || true)
          BAD=$(echo "$FILES" | grep -v "Packages/Observability/" || true)
          if [ -n "$BAD" ]; then
            echo "❌ Firebase imported outside Observability package:"
            echo "$BAD"
            exit 1
          fi
          echo "✅ All Firebase imports are confined to Observability package."

      - name: Check no hardcoded strings (String Catalog enforcement)
        run: |
          echo "Checking for hardcoded UI strings..."
          # This regex looks for Text("...") with Turkish/English content.
          # Exempt: DesignSystem previews.
          BAD=$(grep -rP 'Text\("[A-Za-zğĞüÜşŞıİöÖçÇ].*"\)' Packages/ App/ 2>/dev/null | grep -v Preview | grep -v "String(localized:" | grep -v "Comment" || true)
          if [ -n "$BAD" ]; then
            echo "⚠️  Potential hardcoded strings found (manual review needed):"
            echo "$BAD"
            echo "Ensure these use String(localized:) or String Catalog keys."
          fi
          echo "✅ Hardcoded string check complete."

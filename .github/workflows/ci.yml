name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 27
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Lint — SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging --config .swiftlint.yml
        continue-on-error: false

      - name: Format check — SwiftFormat
        run: swiftformat --lint --config .swiftformat .
        continue-on-error: false

      - name: Commit message format check
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            gh pr view ${{ github.event.pull_request.number }} --json commits --jq '.commits[].messageHeadline' | while read -r msg; do
              if ! echo "$msg" | grep -qE '^(feat|fix|docs|style|refactor|test|chore|perf|ci|build)(\(.+\))?!?: .+'; then
                echo "❌ Invalid commit message: $msg"
                echo "Must match Conventional Commits format."
                exit 1
              fi
            done
          fi

      - name: Build packages
        run: |
          for pkg in Packages/*/; do
            echo "Building $pkg..."
            swift build --package-path "$pkg" -Xswiftc -strict-concurrency=complete
          done

      - name: Run tests
        run: |
          FAILED=0
          for pkg in Packages/*/; do
            if [ -d "${pkg}Tests" ]; then
              echo "Testing $pkg..."
              swift test --package-path "$pkg" --enable-code-coverage -Xswiftc -strict-concurrency=complete || FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "❌ One or more test suites failed."
            exit 1
          fi

      - name: Check coverage threshold (70%)
        run: |
          echo "Coverage check — minimum 70% line coverage"
          TOTAL_COVERED=0
          TOTAL_LINES=0
          for pkg in Packages/*/; do
            PROF_DATA=$(find "$pkg" -name "default.profdata" 2>/dev/null | head -1)
            if [ -n "$PROF_DATA" ]; then
              BINARY=$(find "$pkg/.build" -type f -perm +111 -name "$(basename "$pkg")*" 2>/dev/null | grep -v '.swiftmodule' | head -1)
              if [ -n "$BINARY" ]; then
                COV_JSON=$(xcrun llvm-cov export "$BINARY" -instr-profile="$PROF_DATA" -format=text 2>/dev/null || echo "{}")
                COVERED=$(echo "$COV_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(int(d.get('data',[{}])[0].get('totals',{}).get('lines',{}).get('covered',0)))" 2>/dev/null || echo 0)
                TOTAL=$(echo "$COV_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(int(d.get('data',[{}])[0].get('totals',{}).get('lines',{}).get('count',1)))" 2>/dev/null || echo 1)
                TOTAL_COVERED=$((TOTAL_COVERED + COVERED))
                TOTAL_LINES=$((TOTAL_LINES + TOTAL))
              fi
            fi
          done
          if [ "$TOTAL_LINES" -gt 0 ]; then
            COVERAGE=$(python3 -c "print(int($TOTAL_COVERED / $TOTAL_LINES * 100))")
            echo "Line coverage: ${COVERAGE}% (${TOTAL_COVERED}/${TOTAL_LINES} lines)"
            if [ "$COVERAGE" -lt 70 ]; then
              echo "❌ Coverage ${COVERAGE}% is below 70% threshold."
              exit 1
            fi
            echo "✅ Coverage threshold met."
          else
            echo "⚠️  No coverage data found. Run with --enable-code-coverage."
          fi

      - name: Check no direct Firebase import outside Observability
        run: |
          echo "Checking that only Observability imports Firebase..."
          FILES=$(grep -rl "import FirebaseAnalytics\|import FirebaseCrashlytics" Packages/ || true)
          BAD=$(echo "$FILES" | grep -v "Packages/Observability/" || true)
          if [ -n "$BAD" ]; then
            echo "❌ Firebase imported outside Observability package:"
            echo "$BAD"
            exit 1
          fi
          echo "✅ All Firebase imports are confined to Observability package."

      - name: Build app target (Tuist)
        run: |
          if command -v tuist &> /dev/null; then
            tuist generate --no-open
            xcodebuild -workspace Vade.xcworkspace -scheme Vade -destination 'platform=iOS Simulator,name=iPhone 17 Pro' CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO 2>&1 | tail -20
          else
            echo "⚠️  Tuist not installed — skipping app target build."
          fi

      - name: Check no hardcoded strings (String Catalog enforcement)
        run: |
          echo "Checking for hardcoded UI strings..."
          BAD=$(grep -rP 'Text\("[A-Za-zğĞüÜşŞıİöÖçÇ].*"\)' Packages/ App/ 2>/dev/null | grep -v Preview | grep -v "String(localized:" | grep -v "Comment" || true)
          if [ -n "$BAD" ]; then
            echo "❌ Hardcoded UI strings found:"
            echo "$BAD"
            echo "Use String(localized:) or String Catalog keys."
            exit 1
          fi
          echo "✅ Hardcoded string check passed."
